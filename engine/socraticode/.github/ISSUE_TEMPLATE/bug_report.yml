name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I run codebase_index on a project with...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure MCP host with ...
        2. Run codebase_index on ...
        3. Then run codebase_search with query ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or log output if available.
    validations:
      required: true

  - type: dropdown
    id: embedding-provider
    attributes:
      label: Embedding provider
      description: Which embedding provider are you using?
      options:
        - Ollama (Docker — default)
        - Ollama (native / external)
        - OpenAI
        - Google Gemini
    validations:
      required: true

  - type: dropdown
    id: qdrant-mode
    attributes:
      label: Qdrant mode
      description: How is Qdrant running?
      options:
        - Managed (Docker — default)
        - External (self-hosted / cloud)
    validations:
      required: true

  - type: dropdown
    id: mcp-host
    attributes:
      label: MCP host
      description: Which MCP host are you using?
      options:
        - VS Code (GitHub Copilot)
        - Claude Desktop
        - Cursor
        - Windsurf
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. macOS 15.3, Ubuntu 24.04, Windows 11
      placeholder: macOS 15.3
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v22.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste any relevant log output. Set `SOCRATICODE_LOG_LEVEL=debug` and/or `SOCRATICODE_LOG_FILE=/tmp/socraticode.log` to capture detailed logs.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or configuration details.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this hasn't been reported before
          required: true
        - label: I am using the latest version of SocratiCode
          required: true
